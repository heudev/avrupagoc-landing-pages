<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Tasarım Adayları</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .wrap { width: 100%; max-width: 480px; text-align: center; }
    h1 { font-size: 26px; font-weight: 700; letter-spacing: -.01em; }
    .sub { color: #6b7280; margin-top: 8px; font-size: 15px; }
    .list { margin-top: 36px; display: flex; flex-direction: column; gap: 12px; }
    .item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px;
      border: 1px solid #e5e7eb; border-radius: 14px;
      text-decoration: none; color: #111827;
      font-size: 16px; font-weight: 500;
      transition: border-color .15s ease, background .15s ease;
    }
    .item:hover { border-color: #111827; background: #fafafa; }
    .arrow { color: #9ca3af; }
    .item:hover .arrow { color: #111827; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tasarım Adayları</h1>
    <p class="sub">İncelemek için bir tasarım seç.</p>
    <div class="list">
      <a class="item" href="/tasarim-1"><span>Tasarım 1</span><span class="arrow">→</span></a>
      <a class="item" href="/tasarim-2"><span>Tasarım 2</span><span class="arrow">→</span></a>
      <a class="item" href="/tasarim-3"><span>Tasarım 3</span><span class="arrow">→</span></a>
      <a class="item" href="/tasarim-4"><span>Tasarım 4</span><span class="arrow">→</span></a>
      <a class="item" href="/tasarim-5"><span>Tasarım 5</span><span class="arrow">→</span></a>
    </div>
  </div>
</body>
</html>
